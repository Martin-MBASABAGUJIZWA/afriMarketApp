<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">

  <!-- Primary SEO -->
  <title>AfriMarket — Find it nearby. Buy with trust.</title>
  <meta name="description" content="AfriMarket is Africa's trusted marketplace. Shop fresh produce, electronics, fashion, and more from verified local sellers near you.">
  <meta name="keywords" content="AfriMarket, African marketplace, buy online Rwanda, Jumia alternative, local sellers, MTN MoMo shopping">
  <meta name="author" content="AfriMarket">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://afrimarket.vercel.app/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="AfriMarket — Find it nearby. Buy with trust.">
  <meta property="og:description" content="Shop from verified local sellers across Africa. Fresh produce, electronics, fashion, and more — delivered to your door.">
  <meta property="og:url" content="https://afrimarket.vercel.app/">
  <meta property="og:site_name" content="AfriMarket">
  <meta property="og:image" content="https://afrimarket.vercel.app/icons/Icon-512.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:locale" content="en_RW">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="AfriMarket — Find it nearby. Buy with trust.">
  <meta name="twitter:description" content="Shop from verified local sellers across Africa.">
  <meta name="twitter:image" content="https://afrimarket.vercel.app/icons/Icon-512.png">

  <!-- PWA & Mobile -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AfriMarket">
  <meta name="theme-color" content="#2E7D32">
  <meta name="msapplication-TileColor" content="#2E7D32">

  <!-- Icons -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "AfriMarket",
    "url": "https://afrimarket.vercel.app",
    "description": "Africa's trusted local marketplace",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://afrimarket.vercel.app/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background-color: #F5F5F5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #1B5E20 0%, #2E7D32 50%, #388E3C 100%);
      z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-logo {
      width: 88px;
      height: 88px;
      background: rgba(255,255,255,0.15);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255,255,255,0.25);
    }

    .loading-logo svg {
      width: 52px;
      height: 52px;
      fill: white;
    }

    .loading-title {
      font-size: 32px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .loading-tagline {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      font-weight: 400;
      margin-bottom: 48px;
      letter-spacing: 0.2px;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-footer {
      position: absolute;
      bottom: 32px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <!-- Native loading screen shown while Flutter initialises -->
  <div id="loading-screen" aria-label="Loading AfriMarket" role="status">
    <div class="loading-logo">
      <!-- Shopping bag icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-3c1.66 0 3 1.34 3 3H9c0-1.66 1.34-3 3-3zm0 10c-1.66 0-3-1.34-3-3h2c0 .55.45 1 1 1s1-.45 1-1h2c0 1.66-1.34 3-3 3z"/>
      </svg>
    </div>
    <div class="loading-title">AfriMarket</div>
    <div class="loading-tagline">Find it nearby. Buy with trust.</div>
    <div class="loading-spinner" aria-hidden="true"></div>
    <div class="loading-footer">Connecting to your local market&hellip;</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Hide the loading screen once Flutter signals it is ready
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('loading-screen');
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(function() { loader.remove(); }, 450);
      }
    });
  </script>
</body>
</html>
