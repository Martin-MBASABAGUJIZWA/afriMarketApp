name: afrimarket
description: AfriMarket - African Marketplace Platform
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Backend
  supabase_flutter: ^2.12.4
  
  # Navigation
  go_router: ^14.8.1
  
  # Models & Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  
  # UI & Hooks
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.6.1
  responsive_framework: ^1.4.0
  
  # Network & Images
  cached_network_image: ^3.3.1
  
  # Utilities
  flutter_dotenv: ^5.2.1
  intl: ^0.19.0
  image_picker: ^1.1.2
  uuid: ^4.4.2
  google_fonts: ^6.2.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^4.0.0
  
  # Build Runners
  build_runner: ^2.5.4
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  # Testing
  mockito: ^5.4.6

flutter:
  uses-material-design: true
  
  assets:
    - .env.development
    - .env.production
